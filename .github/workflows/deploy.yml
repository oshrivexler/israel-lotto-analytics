name: Update data & deploy

on:
  push:
    branches: [main]
  schedule:
    # רץ כל יום ב-04:00 UTC (≈07:00 בישראל) — אחרי פרסום תוצאות ההגרלות (שלישי/שבת בלילה)
    - cron: '0 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --- עדכון נתונים מפיס (רק בריצה מתוזמנת/ידנית, לא בכל push של קוד) ---
      # מנוע הניתוח (Node) ללא תלויות חיצוניות, לכן אין צורך ב-npm install בשלב הזה.
      - name: Refresh data from Pais
        id: refresh
        if: github.event_name != 'push'
        run: |
          echo "changed=false" >> "$GITHUB_OUTPUT"
          if node analysis/fetch.mjs; then
            node analysis/analyze.mjs
            if git diff --quiet -- data/lotto.csv src/data/stats.json src/data/draws.json; then
              echo "אין הגרלה חדשה — אין מה לעדכן."
            else
              git config user.name "lotto-data-bot"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add data/lotto.csv src/data/stats.json src/data/draws.json
              git commit -m "chore: עדכון תוצאות לוטו מאתר מפעל הפיס"
              git push
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::warning::משיכת הנתונים מפיס נכשלה (ייתכן חסימת IP מהרץ) — נשמרים הנתונים הקיימים."
          fi

      # --- בנייה ופרסום (רק כשיש שינוי קוד או הגרלה חדשה) ---
      - name: Install deps
        if: github.event_name == 'push' || steps.refresh.outputs.changed == 'true'
        run: npm ci

      - name: Build
        if: github.event_name == 'push' || steps.refresh.outputs.changed == 'true'
        run: npx vite build

      - name: Configure Pages
        if: github.event_name == 'push' || steps.refresh.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name == 'push' || steps.refresh.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.event_name == 'push' || steps.refresh.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
